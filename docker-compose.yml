version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports: ["8000:8000"]
    environment:
      LLM_PROVIDER: vllm
      VLLM_ENDPOINT: http://vllm:8000/v1
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      vllm: {condition: service_healthy}
      qdrant: {condition: service_started}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./models:/app/models
    networks: [agent-net]

  vllm:
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
    volumes:
      - model_cache:/root/.cache/huggingface
    networks: [agent-net]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]
    networks: [agent-net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: business_agent
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d business_agent"]
      interval: 5s
      retries: 5
    networks: [agent-net]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    networks: [agent-net]

volumes:
  pgdata:
  qdrant_data:
  model_cache:

networks:
  agent-net:
    driver: bridge